        <div class="container">
          <header class="team-heading inquiry-page-heading">
            <h1 class="sr-only">소싱 요청</h1>
          </header>

          <section class="inquiry-section" aria-labelledby="inquiry-title">
            <div class="inquiry-panel">
              <div class="inquiry-copy">
                <h2 id="inquiry-title">구매하고 싶은 제품을 알려주세요</h2>
                <p>제품, 수량, 연락처를 공유해 주세요. 이우 공급처와 가격, 소싱 옵션을 찾아드립니다.</p>
              </div>
              <form class="inquiry-form js-inquiry-form" data-required-message="제품 요청과 연락처를 최소한 입력해 주세요." data-copied-message="복사되었습니다. WeChat에서 18658925544를 검색한 뒤 요청 내용을 붙여넣어 주세요." data-copy-fail-message="복사에 실패했습니다. 요청 내용을 직접 복사해 주세요." data-telegram-copied-message="요청 내용이 복사되었습니다. Telegram이 열리면 붙여넣어 보내세요.">
                <label class="field field-wide">
                  <span>필요한 제품</span>
                  <input name="product" type="text" placeholder="예: 달러스토어 상품, 주방용품, 장난감, 수납용품…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>제품 카테고리</span>
                  <select name="category">
                  <option value="">선택하세요</option>
                  <option value="생활용품">생활용품</option>
                  <option value="달러스토어 공급">달러스토어 공급</option>
                  <option value="주방용품">주방용품</option>
                  <option value="홈 수납">홈 수납</option>
                  <option value="장난감 & 선물">장난감 & 선물</option>
                  <option value="뷰티 & 퍼스널케어">뷰티 & 퍼스널케어</option>
                  <option value="기타">기타</option>
                  </select>
                </label>
                <label class="field">
                  <span>예상 수량</span>
                  <input name="quantity" type="text" placeholder="예: 1,000개 / 컨테이너 1대 / 테스트 주문" autocomplete="off" />
                </label>
                <label class="field">
                  <span>예산 범위</span>
                  <input name="budget" type="text" placeholder="예: USD 5,000 또는 목표 단가" autocomplete="off" />
                </label>
                <label class="field">
                  <span>대상 시장</span>
                  <input name="market" type="text" placeholder="예: 미국, 프랑스, 사우디아라비아, 러시아…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>연락처</span>
                  <input name="contact" type="text" placeholder="WhatsApp / 이메일 / WeChat ID" autocomplete="off" />
                </label>
                <label class="field">
                  <span>이름 / 회사</span>
                  <input name="company" type="text" placeholder="이름 또는 회사명" autocomplete="organization" />
                </label>
                <label class="field field-wide">
                  <span>메모</span>
                  <textarea name="note" rows="3" placeholder="색상, 포장, 참고 이미지, 납기 등"></textarea>
                </label>
                <div class="inquiry-actions">
                  <button type="button" class="inquiry-button inquiry-button-primary js-inquiry-send" data-channel="whatsapp"><img class="inquiry-button-icon" src="../../assets/whatsapp-ios-icon.webp" alt="" aria-hidden="true" decoding="async" /><span>WhatsApp으로 보내기</span></button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="gmail"><img class="inquiry-button-icon" src="../../assets/gmail-ios-icon.webp" alt="" aria-hidden="true" decoding="async" /><span>Gmail로 보내기</span></button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="wechat"><img class="inquiry-button-icon" src="../../assets/wechat-ios-icon.webp" alt="" aria-hidden="true" decoding="async" /><span>WeChat용 복사</span></button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="telegram"><img class="inquiry-button-icon" src="../../assets/telegram-ios-icon.svg?v=official-1" alt="" aria-hidden="true" decoding="async" /><span>Telegram으로 보내기</span></button>
                </div>
                <p class="inquiry-status" aria-live="polite"></p>
              </form>
            </div>

      <nav class="sticky-contact-group" aria-label="Quick contact">
        <a class="sticky-contact sticky-contact-whatsapp js-app-open" href="https://wa.me/8618658925544" data-app-link="whatsapp://send?phone=8618658925544" data-web-link="https://wa.me/8618658925544" data-copy-text="+8618658925544" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp +8618658925544">
          <img loading="lazy" src="../../assets/whatsapp-ios-icon.webp" alt="" aria-hidden="true" />
          <span>WhatsApp</span>
        </a>
      </nav>

    <script>
      (function () {
        document.querySelectorAll(".language-options a").forEach(function (link) {
          link.addEventListener("click", function () {
            try { sessionStorage.setItem("jabbarManualLanguage", "1"); } catch (error) {}
          });
        });
        document.querySelectorAll(".js-inquiry-form").forEach(function (form) {
          var status = form.querySelector(".inquiry-status");
          var getValue = function (name) {
            var field = form.elements[name];
            return field ? String(field.value || "").trim() : "";
          };
          var buildMessage = function () {
            var labels = Array.prototype.slice.call(form.querySelectorAll(".field")).map(function (field) {
              var label = field.querySelector("span");
              var control = field.querySelector("input, select, textarea");
              return control && label ? [control.name, label.textContent.trim()] : null;
            }).filter(Boolean);
            var lines = ["Jabbar Sourcing Team - 소싱 요청"];
            labels.forEach(function (item) {
              var value = getValue(item[0]);
              if (value) lines.push(item[1] + ": " + value);
            });
            lines.push("Page: " + window.location.href.split("#")[0]);
            return lines.join("\n");
          };
          var setStatus = function (message) { if (status) status.textContent = message || ""; };
          form.querySelectorAll(".js-inquiry-send").forEach(function (button) {
            button.addEventListener("click", function () {
              var product = getValue("product");
              var contact = getValue("contact");
              if (!product || !contact) {
                setStatus(form.getAttribute("data-required-message"));
                return;
              }
              var message = buildMessage();
              var channel = button.getAttribute("data-channel");
              if (channel === "whatsapp") {
                window.location.href = "https://wa.me/8618658925544?text=" + encodeURIComponent(message);
                return;
              }
              if (channel === "gmail") {
                window.location.href = "mailto:qianjiabao1999@gmail.com?subject=" + encodeURIComponent("Jabbar Sourcing Team 문의") + "&body=" + encodeURIComponent(message);
                return;
              }
              if (channel === "telegram") {
                var telegramCopied = function () {
                  setStatus(form.getAttribute("data-telegram-copied-message") || "Inquiry copied. Paste it in Telegram after the chat opens.");
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(telegramCopied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
                var telegramOpened = false;
                var markTelegramOpened = function () { telegramOpened = true; };
                window.addEventListener("pagehide", markTelegramOpened, { once: true });
                window.addEventListener("blur", markTelegramOpened, { once: true });
                window.location.href = "tg://resolve?domain=Jabbar199901";
                window.setTimeout(function () {
                  if (!telegramOpened) window.location.href = "https://t.me/Jabbar199901";
                }, 1600);
                return;
              }
              if (channel === "wechat") {
                var copied = function () {
                  setStatus(form.getAttribute("data-copied-message"));
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(copied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
              }
            });
          });
        });
      })();
    </script>
