<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jabbar SourcingTeam에 소싱 요청을 보내세요." />
    <meta name="theme-color" content="#ffffff" />
    <title>소싱 요청 | Jabbar SourcingTeam</title>
    <link rel="icon" href="../../assets/favicon.svg?v=jabbar-1" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="../../styles.css?v=apple-39" />
  </head>
  <body>
    <main>
      <section class="team inquiry-page" id="inquiry">
        <details class="language-switch language-menu">
          <summary>한국어</summary>
          <nav class="language-options" aria-label="언어 선택">
            <a href="/inquiry/" lang="zh-CN">中文</a>
            <a href="/en/inquiry/" lang="en">English</a>
            <a href="/ru/inquiry/" lang="ru">Русский</a>
            <a href="/fr/inquiry/" lang="fr">Français</a>
            <a href="/es/inquiry/" lang="es">Español</a>
            <a href="/ar/inquiry/" lang="ar" dir="rtl">العربية</a>
            <a href="/pt/inquiry/" lang="pt">Português</a>
            <a href="/de/inquiry/" lang="de">Deutsch</a>
            <a href="/it/inquiry/" lang="it">Italiano</a>
            <a href="/tr/inquiry/" lang="tr">Türkçe</a>
            <a href="/ja/inquiry/" lang="ja">日本語</a>
            <a href="/ko/inquiry/" lang="ko">한국어</a>
            <a href="/id/inquiry/" lang="id">Bahasa Indonesia</a>
            <a href="/vi/inquiry/" lang="vi">Tiếng Việt</a>
            <a href="/th/inquiry/" lang="th">ไทย</a>
            <a href="/hi/inquiry/" lang="hi">हिन्दी</a>
          </nav>
        </details>
        <div class="container">
          <header class="team-heading inquiry-page-heading">
            <h1>소싱 요청</h1>
            <p>구매하고 싶은 제품을 알려주세요. 이우 공급처, 가격, 소싱 옵션을 매칭해 드립니다.</p>
            <a class="inquiry-back" href="../">홈으로 돌아가기</a>
          </header>

          <section class="inquiry-section" aria-labelledby="inquiry-title">
            <div class="inquiry-panel">
              <div class="inquiry-copy">
                <span class="inquiry-eyebrow">소싱 요청</span>
                <h2 id="inquiry-title">구매하고 싶은 제품을 알려주세요</h2>
                <p>제품, 수량, 연락처를 공유해 주세요. 이우 공급처와 가격, 소싱 옵션을 찾아드립니다.</p>
              </div>
              <form class="inquiry-form js-inquiry-form" data-required-message="제품 요청과 연락처를 최소한 입력해 주세요." data-copied-message="복사되었습니다. WeChat에서 18658925544를 검색한 뒤 요청 내용을 붙여넣어 주세요." data-copy-fail-message="복사에 실패했습니다. 요청 내용을 직접 복사해 주세요.">
                <label class="field field-wide">
                  <span>필요한 제품</span>
                  <input name="product" type="text" placeholder="예: 달러스토어 상품, 주방용품, 장난감, 수납용품…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>제품 카테고리</span>
                  <select name="category">
                  <option value="">선택하세요</option>
                  <option value="생활용품">생활용품</option>
                  <option value="달러스토어 공급">달러스토어 공급</option>
                  <option value="주방용품">주방용품</option>
                  <option value="홈 수납">홈 수납</option>
                  <option value="장난감 & 선물">장난감 & 선물</option>
                  <option value="뷰티 & 퍼스널케어">뷰티 & 퍼스널케어</option>
                  <option value="기타">기타</option>
                  </select>
                </label>
                <label class="field">
                  <span>예상 수량</span>
                  <input name="quantity" type="text" placeholder="예: 1,000개 / 컨테이너 1대 / 테스트 주문" autocomplete="off" />
                </label>
                <label class="field">
                  <span>예산 범위</span>
                  <input name="budget" type="text" placeholder="예: USD 5,000 또는 목표 단가" autocomplete="off" />
                </label>
                <label class="field">
                  <span>대상 시장</span>
                  <input name="market" type="text" placeholder="예: 미국, 프랑스, 사우디아라비아, 러시아…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>연락처</span>
                  <input name="contact" type="text" placeholder="WhatsApp / 이메일 / WeChat ID" autocomplete="off" />
                </label>
                <label class="field">
                  <span>이름 / 회사</span>
                  <input name="company" type="text" placeholder="이름 또는 회사명" autocomplete="organization" />
                </label>
                <label class="field field-wide">
                  <span>메모</span>
                  <textarea name="note" rows="3" placeholder="색상, 포장, 참고 이미지, 납기 등"></textarea>
                </label>
                <div class="inquiry-actions">
                  <button type="button" class="inquiry-button inquiry-button-primary js-inquiry-send" data-channel="whatsapp">WhatsApp으로 보내기</button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="gmail">Gmail로 보내기</button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="wechat">WeChat용 복사</button>
                </div>
                <p class="inquiry-status" aria-live="polite"></p>
              </form>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script>
      (function () {
        document.querySelectorAll(".language-options a").forEach(function (link) {
          link.addEventListener("click", function () {
            try { sessionStorage.setItem("jabbarManualLanguage", "1"); } catch (error) {}
          });
        });
        document.querySelectorAll(".js-inquiry-form").forEach(function (form) {
          var status = form.querySelector(".inquiry-status");
          var getValue = function (name) {
            var field = form.elements[name];
            return field ? String(field.value || "").trim() : "";
          };
          var buildMessage = function () {
            var labels = Array.prototype.slice.call(form.querySelectorAll(".field")).map(function (field) {
              var label = field.querySelector("span");
              var control = field.querySelector("input, select, textarea");
              return control && label ? [control.name, label.textContent.trim()] : null;
            }).filter(Boolean);
            var lines = ["Jabbar SourcingTeam - 소싱 요청"];
            labels.forEach(function (item) {
              var value = getValue(item[0]);
              if (value) lines.push(item[1] + ": " + value);
            });
            lines.push("Page: " + window.location.href.split("#")[0]);
            return lines.join("\n");
          };
          var setStatus = function (message) { if (status) status.textContent = message || ""; };
          form.querySelectorAll(".js-inquiry-send").forEach(function (button) {
            button.addEventListener("click", function () {
              var product = getValue("product");
              var contact = getValue("contact");
              if (!product || !contact) {
                setStatus(form.getAttribute("data-required-message"));
                return;
              }
              var message = buildMessage();
              var channel = button.getAttribute("data-channel");
              if (channel === "whatsapp") {
                window.location.href = "https://api.whatsapp.com/send?phone=8618658925544&text=" + encodeURIComponent(message);
                return;
              }
              if (channel === "gmail") {
                window.location.href = "https://mail.google.com/mail/?view=cm&fs=1&to=qianjiabao1999@gmail.com&su=" + encodeURIComponent("Jabbar SourcingTeam 문의") + "&body=" + encodeURIComponent(message);
                return;
              }
              if (channel === "wechat") {
                var copied = function () {
                  setStatus(form.getAttribute("data-copied-message"));
                  window.setTimeout(function () { window.location.href = "weixin://"; }, 250);
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(copied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
              }
            });
          });
        });
      })();
    </script>
  </body>
</html>
