    <script>
      (function () {
        document.querySelectorAll(".language-options a").forEach(function (link) {
          link.addEventListener("click", function () {
            try { sessionStorage.setItem("jabbarManualLanguage", "1"); } catch (error) {}
          });
        });
        document.querySelectorAll(".js-inquiry-form").forEach(function (form) {
          var status = form.querySelector(".inquiry-status");
          var getValue = function (name) {
            var field = form.elements[name];
            return field ? String(field.value || "").trim() : "";
          };
          var buildMessage = function () {
            var labels = Array.prototype.slice.call(form.querySelectorAll(".field")).map(function (field) {
              var label = field.querySelector("span");
              var control = field.querySelector("input, select, textarea");
              return control && label ? [control.name, label.textContent.trim()] : null;
            }).filter(Boolean);
            var lines = ["Jabbar Sourcing Team - 采购需求"];
            labels.forEach(function (item) {
              var value = getValue(item[0]);
              if (value) lines.push(item[1] + ": " + value);
            });
            lines.push("页面: " + window.location.href.split("#")[0]);
            return lines.join("\n");
          };
          var setStatus = function (message) { if (status) status.textContent = message || ""; };
          form.querySelectorAll(".js-inquiry-send").forEach(function (button) {
            button.addEventListener("click", function () {
              var product = getValue("product");
              var contact = getValue("contact");
              if (!product || !contact) {
                setStatus(form.getAttribute("data-required-message"));
                return;
              }
              var message = buildMessage();
              var channel = button.getAttribute("data-channel");
              if (channel === "whatsapp") {
                window.location.href = "https://wa.me/8618658925544?text=" + encodeURIComponent(message);
                return;
              }
              if (channel === "gmail") {
                window.location.href = "mailto:qianjiabao1999@gmail.com?subject=" + encodeURIComponent("Jabbar Sourcing Team inquiry") + "&body=" + encodeURIComponent(message);
                return;
              }
              if (channel === "telegram") {
                var telegramCopied = function () {
                  setStatus(form.getAttribute("data-telegram-copied-message") || "Inquiry copied. Paste it in Telegram after the chat opens.");
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(telegramCopied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
                var telegramOpened = false;
                var markTelegramOpened = function () { telegramOpened = true; };
                window.addEventListener("pagehide", markTelegramOpened, { once: true });
                window.addEventListener("blur", markTelegramOpened, { once: true });
                window.location.href = "tg://resolve?domain=Jabbar199901";
                window.setTimeout(function () {
                  if (!telegramOpened) window.location.href = "https://t.me/Jabbar199901";
                }, 1600);
                return;
              }
              if (channel === "wechat") {
                var copied = function () {
                  setStatus(form.getAttribute("data-copied-message"));
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(copied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
              }
            });
          });
        });
      })();
