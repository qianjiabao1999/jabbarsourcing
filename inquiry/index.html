<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jabbar Sourcing Team 采购需求登记。" />
    <meta name="theme-color" content="#ffffff" />
    <title>采购需求登记 | Jabbar Sourcing Team</title>
    <link rel="icon" href="../assets/favicon.svg?v=jabbar-1" type="image/svg+xml" sizes="any" />
    <link rel="stylesheet" href="../styles.css?v=apple-42" />
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var isInquiry = path === "/inquiry/" || path === "/inquiry/index.html";
          var manual = window.sessionStorage && sessionStorage.getItem("jabbarManualLanguage") === "1";
          if (!isInquiry || manual) return;
          var languages = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || "en"];
          var map = {
            zh: "/inquiry/",
            en: "/en/inquiry/",
            ha: "/ha/inquiry/",
            kk: "/kk/inquiry/",
            ru: "/ru/inquiry/",
            fr: "/fr/inquiry/",
            es: "/es/inquiry/",
            ar: "/ar/inquiry/",
            pt: "/pt/inquiry/",
            de: "/de/inquiry/",
            it: "/it/inquiry/",
            tr: "/tr/inquiry/",
            ja: "/ja/inquiry/",
            ko: "/ko/inquiry/",
            id: "/id/inquiry/",
            vi: "/vi/inquiry/",
            th: "/th/inquiry/",
            hi: "/hi/inquiry/"
          };
          var target = "/en/inquiry/";
          for (var i = 0; i < languages.length; i += 1) {
            var code = String(languages[i] || "").toLowerCase().split("-")[0];
            if (map[code]) { target = map[code]; break; }
          }
          if (target !== "/inquiry/") window.location.replace(target + window.location.search + window.location.hash);
        } catch (error) {}
      })();
    </script>
  </head>
  <body>
    <main>
      <section class="team inquiry-page" id="inquiry">
        <details class="language-switch language-menu">
          <summary>中文</summary>
          <nav class="language-options" aria-label="语言切换">
            <a href="/inquiry/" lang="zh-CN">中文</a>
            <a href="/en/inquiry/" lang="en">English</a>
            <a href="/ha/inquiry/" lang="ha">Hausa</a>
            <a href="/kk/inquiry/" lang="kk">Қазақша</a>
            <a href="/ru/inquiry/" lang="ru">Русский</a>
            <a href="/fr/inquiry/" lang="fr">Français</a>
            <a href="/es/inquiry/" lang="es">Español</a>
            <a href="/ar/inquiry/" lang="ar" dir="rtl">العربية</a>
            <a href="/pt/inquiry/" lang="pt">Português</a>
            <a href="/de/inquiry/" lang="de">Deutsch</a>
            <a href="/it/inquiry/" lang="it">Italiano</a>
            <a href="/tr/inquiry/" lang="tr">Türkçe</a>
            <a href="/ja/inquiry/" lang="ja">日本語</a>
            <a href="/ko/inquiry/" lang="ko">한국어</a>
            <a href="/id/inquiry/" lang="id">Bahasa Indonesia</a>
            <a href="/vi/inquiry/" lang="vi">Tiếng Việt</a>
            <a href="/th/inquiry/" lang="th">ไทย</a>
            <a href="/hi/inquiry/" lang="hi">हिन्दी</a>
          </nav>
        </details>
        <div class="container">
          <header class="team-heading inquiry-page-heading">
            <h1>采购需求登记</h1>
            <p>告诉我们你想采购什么，我们帮你匹配义乌货源、报价与采购方案。</p>
            <a class="inquiry-back" href="../">返回首页</a>
          </header>

          <section class="inquiry-section" aria-labelledby="inquiry-title">
            <div class="inquiry-panel">
              <div class="inquiry-copy">
                <span class="inquiry-eyebrow">Sourcing Request</span>
                <h2 id="inquiry-title">告诉我们你想采购什么</h2>
                <p>填写产品、数量和联系方式，我们会根据你的需求匹配义乌货源、报价与采购方案。</p>
              </div>
              <form class="inquiry-form js-inquiry-form" data-required-message="请至少填写产品需求和联系方式。" data-copied-message="已复制需求内容，请在微信中搜索 18658925544 添加并粘贴发送。" data-copy-fail-message="复制失败，请手动复制页面中的需求内容。">
                <label class="field field-wide">
                  <span>想采购的产品</span>
                  <input name="product" type="text" placeholder="例如：一元店百货、厨房用品、玩具、收纳用品…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>产品方向</span>
                  <select name="category">
                  <option value="">请选择</option>
                  <option value="日用百货">日用百货</option>
                  <option value="一元店/折扣店货源">一元店/折扣店货源</option>
                  <option value="厨房用品">厨房用品</option>
                  <option value="家居收纳">家居收纳</option>
                  <option value="玩具礼品">玩具礼品</option>
                  <option value="美妆个护">美妆个护</option>
                  <option value="其他">其他</option>
                  </select>
                </label>
                <label class="field">
                  <span>预计数量</span>
                  <input name="quantity" type="text" placeholder="例如：1000 件 / 1 个柜 / 试单" autocomplete="off" />
                </label>
                <label class="field">
                  <span>预算范围</span>
                  <input name="budget" type="text" placeholder="例如：USD 5,000 或目标单价" autocomplete="off" />
                </label>
                <label class="field">
                  <span>销售国家/地区</span>
                  <input name="market" type="text" placeholder="例如：美国、法国、沙特、俄罗斯…" autocomplete="off" />
                </label>
                <label class="field">
                  <span>联系方式</span>
                  <input name="contact" type="text" placeholder="WhatsApp / 邮箱 / 微信号" autocomplete="off" />
                </label>
                <label class="field">
                  <span>姓名/公司</span>
                  <input name="company" type="text" placeholder="你的姓名或公司名称" autocomplete="organization" />
                </label>
                <label class="field field-wide">
                  <span>补充说明</span>
                  <textarea name="note" rows="3" placeholder="颜色、包装、图片参考、交期要求等"></textarea>
                </label>
                <div class="inquiry-actions">
                  <button type="button" class="inquiry-button inquiry-button-primary js-inquiry-send" data-channel="whatsapp">发送到 WhatsApp</button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="gmail">通过 Gmail 发送</button>
                  <button type="button" class="inquiry-button js-inquiry-send" data-channel="wechat">复制并打开微信</button>
                </div>
                <p class="inquiry-status" aria-live="polite"></p>
              </form>
            </div>
          </section>
        </div>
      </section>

      <a class="sticky-whatsapp" href="https://api.whatsapp.com/send?phone=8618658925544" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp +8618658925544">
        <img src="../assets/whatsapp-ios-icon.png" alt="" aria-hidden="true" />
        <span>WhatsApp</span>
      </a>
    </main>
    <script>
      (function () {
        document.querySelectorAll(".language-options a").forEach(function (link) {
          link.addEventListener("click", function () {
            try { sessionStorage.setItem("jabbarManualLanguage", "1"); } catch (error) {}
          });
        });
        document.querySelectorAll(".js-inquiry-form").forEach(function (form) {
          var status = form.querySelector(".inquiry-status");
          var getValue = function (name) {
            var field = form.elements[name];
            return field ? String(field.value || "").trim() : "";
          };
          var buildMessage = function () {
            var labels = Array.prototype.slice.call(form.querySelectorAll(".field")).map(function (field) {
              var label = field.querySelector("span");
              var control = field.querySelector("input, select, textarea");
              return control && label ? [control.name, label.textContent.trim()] : null;
            }).filter(Boolean);
            var lines = ["Jabbar Sourcing Team - Sourcing Request"];
            labels.forEach(function (item) {
              var value = getValue(item[0]);
              if (value) lines.push(item[1] + ": " + value);
            });
            lines.push("Page: " + window.location.href.split("#")[0]);
            return lines.join("\n");
          };
          var setStatus = function (message) { if (status) status.textContent = message || ""; };
          form.querySelectorAll(".js-inquiry-send").forEach(function (button) {
            button.addEventListener("click", function () {
              var product = getValue("product");
              var contact = getValue("contact");
              if (!product || !contact) {
                setStatus(form.getAttribute("data-required-message"));
                return;
              }
              var message = buildMessage();
              var channel = button.getAttribute("data-channel");
              if (channel === "whatsapp") {
                window.location.href = "https://api.whatsapp.com/send?phone=8618658925544&text=" + encodeURIComponent(message);
                return;
              }
              if (channel === "gmail") {
                window.location.href = "https://mail.google.com/mail/?view=cm&fs=1&to=qianjiabao1999@gmail.com&su=" + encodeURIComponent("Jabbar Sourcing Team inquiry") + "&body=" + encodeURIComponent(message);
                return;
              }
              if (channel === "wechat") {
                var copied = function () {
                  setStatus(form.getAttribute("data-copied-message"));
                };
                if (navigator.clipboard && window.isSecureContext) {
                  navigator.clipboard.writeText(message).then(copied).catch(function () {
                    setStatus(form.getAttribute("data-copy-fail-message"));
                  });
                } else {
                  setStatus(form.getAttribute("data-copy-fail-message"));
                }
              }
            });
          });
        });
      })();
    </script>
  </body>
</html>
