      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#e9edf5"/>
    </linearGradient>
    <linearGradient id="ink" x1="48" y1="74" x2="213" y2="172" gradientUnits="userSpaceOnUse">
