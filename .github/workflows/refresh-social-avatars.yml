name: Refresh social avatars

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-social-avatars
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install image tooling
        run: npm install --no-save sharp

      - name: Refresh avatars when high quality sources are available
        run: node scripts/update-social-avatars.mjs

      - name: Commit refreshed avatars
        run: |
          if git diff --quiet; then
            echo "No avatar changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/*.webp assets/social-avatars-manifest.json index.html */index.html
          git commit -m "Refresh social avatar assets"
          git push
