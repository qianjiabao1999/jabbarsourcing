name: Refresh social avatars

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-social-avatars
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install image and browser tooling
        run: |
          npm install --no-save sharp
          npx playwright install --with-deps chromium

      - name: Refresh avatars when high quality sources are available
        run: node scripts/update-social-avatars.mjs

      - name: Commit refreshed avatars
        run: |
          git add assets/social-116
          if [ -d assets/social-source ]; then
            git add assets/social-source
          fi
          git add -- ':(glob)**/*.html'

          if git diff --cached --quiet; then
            git restore -- assets/social-avatars-manifest.json
            echo "No material avatar changes."
            exit 0
          fi

          git add assets/social-avatars-manifest.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Refresh social avatar assets"
          git push
