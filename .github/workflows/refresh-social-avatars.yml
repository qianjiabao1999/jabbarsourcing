name: Refresh social avatars

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-social-avatars
  cancel-in-progress: true

jobs:
  refresh:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install image tooling
        run: npm install --no-save sharp

      - name: Refresh avatars when high quality sources are available
        run: node scripts/update-social-avatars.mjs

      - name: Commit refreshed avatars
        id: commit
        run: |
          if git diff --quiet; then
            echo "No avatar changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/social-116/*.webp assets/social-avatars-manifest.json index.html */index.html
          git commit -m "Refresh social avatar assets"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: steps.commit.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
