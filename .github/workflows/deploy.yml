name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/.gitignore' \
            --exclude='/cloudflare/' \
            --exclude='/node_modules/' \
            --exclude='/scripts/' \
            --exclude='/output/' \
            --exclude='/outputs/' \
            --exclude='/artifacts/' \
            --exclude='/_site/' \
            --exclude='/README.md' \
            --exclude='/DEPLOY.md' \
            --exclude='/PROJECT_HANDOFF.md' \
            --exclude='/package.json' \
            --exclude='/package-lock.json' \
            --exclude='/_config.yml' \
            --exclude='/.env' \
            --exclude='/.env.*' \
            --exclude='/.dev.vars' \
            --exclude='/.dev.vars.*' \
            --exclude='/.wrangler/' \
            --exclude='.DS_Store' \
            ./ _site/
          find _site -name '.DS_Store' -delete

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_2.outputs.page_url || steps.deployment_retry_3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry 2
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages retry 2
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before deploy retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages retry 3
        id: deployment_retry_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        uses: actions/deploy-pages@v4

      - name: Stop if all deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure' && steps.deployment_retry_3.outcome == 'failure'
        run: exit 1
