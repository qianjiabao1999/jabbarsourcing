name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cloudflare/inquiry-api/package-lock.json
            cloudflare/site-response-headers/package-lock.json

      - name: Install frontend QA dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run frontend static checks
        run: npm test

      - name: Verify generated CSS is current
        run: |
          npm run build:css
          git diff --exit-code -- styles.min.css

      - name: Run multilingual inquiry browser QA
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/jabbar-static-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/inquiry/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4173/inquiry/ >/dev/null
          npm run qa:inquiry
          npm run qa:ai
          npm run qa:ui
          npm run qa:calculator-order

      - name: Install Worker verification dependencies
        run: npm ci --prefix cloudflare/inquiry-api

      - name: Verify inquiry Worker
        run: npm run verify:worker

      - name: Install security-header Worker verification dependencies
        run: npm ci --prefix cloudflare/site-response-headers

      - name: Verify security-header Worker
        run: npm run verify:security-headers

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a \
            --include='/.nojekyll' \
            --include='/.well-known/' \
            --include='/.well-known/apple-app-site-association' \
            --include='/404.html' \
            --include='/CNAME' \
            --include='/favicon.ico' \
            --include='/1731ed149abf68908090297af19fab14.txt' \
            --include='/google80221688f5a3319b.html' \
            --include='/index.html' \
            --include='/privacy-policy.html' \
            --include='/robots.txt' \
            --include='/script.js' \
            --include='/shipments.json' \
            --include='/site.webmanifest' \
            --include='/sitemap.xml' \
            --include='/styles.min.css' \
            --include='/support.html' \
            --include='/assets/' \
            --exclude='/assets/social-source/' \
            --include='/assets/***' \
            --include='/calculator/' \
            --include='/calculator/index.html' \
            --include='/inquiry/' \
            --include='/inquiry/index.html' \
            --include='/ar/' \
            --include='/ar/index.html' \
            --include='/ar/calculator/' \
            --include='/ar/calculator/index.html' \
            --include='/ar/inquiry/' \
            --include='/ar/inquiry/index.html' \
            --include='/de/' \
            --include='/de/index.html' \
            --include='/de/calculator/' \
            --include='/de/calculator/index.html' \
            --include='/de/inquiry/' \
            --include='/de/inquiry/index.html' \
            --include='/en/' \
            --include='/en/index.html' \
            --include='/en/calculator/' \
            --include='/en/calculator/index.html' \
            --include='/en/inquiry/' \
            --include='/en/inquiry/index.html' \
            --include='/es/' \
            --include='/es/index.html' \
            --include='/es/calculator/' \
            --include='/es/calculator/index.html' \
            --include='/es/inquiry/' \
            --include='/es/inquiry/index.html' \
            --include='/fr/' \
            --include='/fr/index.html' \
            --include='/fr/calculator/' \
            --include='/fr/calculator/index.html' \
            --include='/fr/inquiry/' \
            --include='/fr/inquiry/index.html' \
            --include='/it/' \
            --include='/it/index.html' \
            --include='/it/calculator/' \
            --include='/it/calculator/index.html' \
            --include='/it/inquiry/' \
            --include='/it/inquiry/index.html' \
            --include='/pt/' \
            --include='/pt/index.html' \
            --include='/pt/calculator/' \
            --include='/pt/calculator/index.html' \
            --include='/pt/inquiry/' \
            --include='/pt/inquiry/index.html' \
            --include='/ru/' \
            --include='/ru/index.html' \
            --include='/ru/calculator/' \
            --include='/ru/calculator/index.html' \
            --include='/ru/inquiry/' \
            --include='/ru/inquiry/index.html' \
            --include='/tr/' \
            --include='/tr/index.html' \
            --include='/tr/calculator/' \
            --include='/tr/calculator/index.html' \
            --include='/tr/inquiry/' \
            --include='/tr/inquiry/index.html' \
            --exclude='*' \
            ./ _site/

          required_root_files=(
            .nojekyll
            404.html
            CNAME
            favicon.ico
            1731ed149abf68908090297af19fab14.txt
            google80221688f5a3319b.html
            index.html
            privacy-policy.html
            robots.txt
            script.js
            shipments.json
            site.webmanifest
            sitemap.xml
            styles.min.css
            support.html
          )
          for file in "${required_root_files[@]}"; do
            test -f "_site/$file"
          done
          test "$(tr -d '\r\n' < _site/1731ed149abf68908090297af19fab14.txt)" = "367e44f3f2c27050ecd7708edbfb429fb687b26c"

          locales=(ar de en es fr it pt ru tr)
          for locale in "${locales[@]}"; do
            test -f "_site/$locale/index.html"
            test -f "_site/$locale/calculator/index.html"
            test -f "_site/$locale/inquiry/index.html"
            test "$(find "_site/$locale" -type f | wc -l)" -eq 3
          done
          test -f _site/calculator/index.html
          test -f _site/inquiry/index.html
          test -f _site/.well-known/apple-app-site-association
          test -f _site/assets/site-enhancements.js
          test -f _site/assets/inquiry-form.js
          test -f _site/assets/calculator-order-loader.js
          test -f _site/assets/calculator-order-analyzer.js
          test -f _site/assets/calculator-order-worker.js
          test -f _site/assets/vendor/xlsx.full.min.js
          test "$(find _site -type f -name '*.html' | wc -l)" -eq 34

          test ! -e _site/assets/social-source
          test ! -e _site/styles.css
          unexpected_css="$(find _site -type f -name '*.css' ! -path '_site/styles.min.css' -print)"
          test -z "$unexpected_css"
          unexpected_json="$(find _site -type f -name '*.json' ! -path '_site/shipments.json' ! -path '_site/assets/social-avatars-manifest.json' -print)"
          test -z "$unexpected_json"
          for path in \
            _site/.git \
            _site/.github \
            _site/artifacts \
            _site/cloudflare \
            _site/node_modules \
            _site/output \
            _site/outputs \
            _site/scripts \
            _site/DEPLOY.md \
            _site/PROJECT_HANDOFF.md \
            _site/README.md \
            _site/_config.yml \
            _site/package.json \
            _site/package-lock.json; do
            test ! -e "$path"
          done

          forbidden_files="$(find _site -type f \( \
            -name '*.bak' -o \
            -name '*.backup' -o \
            -name '*.cjs' -o \
            -name '*.csv' -o \
            -name '*.env' -o \
            -name '*.jsonc' -o \
            -name '*.log' -o \
            -name '*.map' -o \
            -name '*.markdown' -o \
            -name '*.md' -o \
            -name '*.mjs' -o \
            -name '*.orig' -o \
            -name '*.rej' -o \
            -name '*.sass' -o \
            -name '*.scss' -o \
            -name '*.sh' -o \
            -name '*.swp' -o \
            -name '*.tmp' -o \
            -name '*.toml' -o \
            -name '*.ts' -o \
            -name '*.tsx' -o \
            -name '*.xls' -o \
            -name '*.xlsm' -o \
            -name '*.xlsx' -o \
            -name '*.yaml' -o \
            -name '*.yml' -o \
            -name '*~' \
          \) -print)"
          if [ -n "$forbidden_files" ]; then
            echo "Forbidden files found in Pages artifact:"
            echo "$forbidden_files"
            exit 1
          fi

          unexpected_hidden="$(find _site -mindepth 1 -name '.*' ! -path '_site/.nojekyll' ! -path '_site/.well-known' -print)"
          test -z "$unexpected_hidden"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_2.outputs.page_url || steps.deployment_retry_3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before deploy retry 2
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages retry 2
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before deploy retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages retry 3
        id: deployment_retry_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Stop if all deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure' && steps.deployment_retry_3.outcome == 'failure'
        run: exit 1
