name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cloudflare/inquiry-api/package-lock.json

      - name: Install frontend QA dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run frontend static checks
        run: npm test

      - name: Verify generated CSS is current
        run: |
          npm run build:css
          git diff --exit-code -- styles.min.css

      - name: Run multilingual inquiry browser QA
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 >/tmp/jabbar-static-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/inquiry/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4173/inquiry/ >/dev/null
          npm run qa:inquiry
          npm run qa:ai
          npm run qa:ui
          npm run qa:calculator-order

      - name: Install Worker verification dependencies
        run: npm ci --prefix cloudflare/inquiry-api

      - name: Verify inquiry Worker
        run: npm run verify:worker

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Prepare static site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -a \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/.gitattributes' \
            --exclude='/.gitignore' \
            --exclude='/.playwright-cli/' \
            --exclude='/cloudflare/' \
            --exclude='/node_modules/' \
            --exclude='/assets/social-source/' \
            --exclude='/scripts/' \
            --exclude='/output/' \
            --exclude='/outputs/' \
            --exclude='/artifacts/' \
            --exclude='/_site/' \
            --exclude='/README.md' \
            --exclude='/DEPLOY.md' \
            --exclude='/PROJECT_HANDOFF.md' \
            --exclude='/package.json' \
            --exclude='/package-lock.json' \
            --exclude='/_config.yml' \
            --exclude='/.env' \
            --exclude='/.env.*' \
            --exclude='/.dev.vars' \
            --exclude='/.dev.vars.*' \
            --exclude='/.wrangler/' \
            --exclude='.DS_Store' \
            ./ _site/
          find _site -name '.DS_Store' -delete
          test -f _site/.nojekyll
          test -f _site/.well-known/apple-app-site-association
          test ! -e _site/.gitattributes
          unexpected_hidden="$(find _site -mindepth 1 -name '.*' ! -path '_site/.nojekyll' ! -path '_site/.well-known' -print)"
          test -z "$unexpected_hidden"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry_2.outputs.page_url || steps.deployment_retry_3.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before deploy retry 2
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - name: Deploy to GitHub Pages retry 2
        id: deployment_retry_2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        continue-on-error: true

      - name: Wait before deploy retry 3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        run: sleep 60

      - name: Deploy to GitHub Pages retry 3
        id: deployment_retry_3
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Stop if all deploy attempts failed
        if: steps.deployment.outcome == 'failure' && steps.deployment_retry_2.outcome == 'failure' && steps.deployment_retry_3.outcome == 'failure'
        run: exit 1
